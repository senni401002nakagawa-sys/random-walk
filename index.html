<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Walk</title>

<style>

body {
    font-family: sans-serif;
    padding: 20px;
}

button {
    font-size: 16px;
    padding: 10px 20px;
    margin-right: 10px;
    margin-top: 10px;
}

#topArea {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

#log {
    margin-top: 20px;
    border: 1px solid #ccc;
    padding: 10px;
    max-height: 500px;
    overflow-y: auto;
    white-space: pre-wrap;
    background: #f8f8f8;
}

svg {
    background: #fafafa;
    border: 1px solid #ccc;
}

.node {
    fill: white;
    stroke: black;
    stroke-width: 2;
}

.node.current {
    fill: red;
}

.edge {
    stroke: #ccc;
    stroke-width: 6;
    stroke-linecap: round;
}

.edge.visited {
    stroke: #0066cc;
}

.edge.current {
    stroke: red;
}

.label {
    font-size: 14px;
    text-anchor: middle;
    dominant-baseline: middle;
}

.home {
    fill: orange;
    stroke: black;
    stroke-width: 2;
}

</style>
</head>

<body>

<h1>ランダム散歩エンジン</h1>

<div id="topArea">

<div>

<p>現在状態: <span id="state"></span></p>
<p>累積距離: <span id="distance">0</span>m</p>
<p>累積標高: <span id="elevation">0</span>m</p>
<p>歩数: <span id="steps">0</span></p>

<button id="stepButton">1歩進む</button>
<button id="autoButton">20歩自動</button>

</div>

<svg id="map" width="900" height="350"></svg>

</div>

<div id="log"></div>

<script>

let transitions = {};
let edges = {};

let currentState = "HOME_START";

let totalDistance = 0;
let totalElevation = 0;
let stepCount = 0;

let edgeVisitCounts = {};
let currentEdge = null;

const nodePositions = {

    A0:{x:80,y:80},
    A1:{x:170,y:80},
    A2:{x:260,y:80},
    A3:{x:350,y:80},
    A4:{x:440,y:80},
    A5:{x:530,y:80},
    A6:{x:620,y:80},
    A7:{x:760,y:80},

    B0:{x:80,y:250},
    B1:{x:170,y:250},
    B2:{x:260,y:250},
    B3:{x:350,y:250},
    B4:{x:440,y:250},
    B5:{x:530,y:250},
    B6:{x:620,y:250},
    B7:{x:760,y:250},

    HOME:{x:395,y:80}
};

async function loadCSV(path){

    const response = await fetch(path);

    const text = await response.text();

    return text
        .trim()
        .split(/\r?\n/)
        .map(line =>
            line.split(",").map(x => x.trim())
        );
}
    const response = await fetch(path);

    const text = await response.text();

    return text
        .trim()
        .split("\n")
        .map(line=>line.split(","));
}

function edgeKey(a,b){

    return `${a}_${b}`;
}

function normalizedEdgeKey(a,b){

    return [a,b].sort().join("_");
}

function parseNode(state){

    return state.split("_")[0];
}

async function initialize(){

    const stateRows =
        await loadCSV("states.csv");

    for(let i=1;i<stateRows.length;i++){

        const [state,action,next] =
            stateRows[i].map(x=>x.trim());

        if(!transitions[state]){

            transitions[state]=[];
        }

        transitions[state].push({
            action,
            next
        });
    }

    const edgeRows =
        await loadCSV("edges.csv");

    for(let i=1;i<edgeRows.length;i++){

        const [from,to,distance,elevation] =
            edgeRows[i].map(x=>x.trim());

        edges[edgeKey(from,to)] = {

            distance:Number(distance),
            elevation:Number(elevation)
        };

        edges[edgeKey(to,from)] = {

            distance:Number(distance),
            elevation:-Number(elevation)
        };
    }

    drawMap();

    updateDisplay();
}

function drawMap(){

    const svg =
        document.getElementById("map");

    svg.innerHTML="";

    const drawn = new Set();

    for(const key in edges){

        const [from,to] = key.split("_");

        const norm =
            normalizedEdgeKey(from,to);

        if(drawn.has(norm)) continue;

        drawn.add(norm);

        const p1 = nodePositions[from];
        const p2 = nodePositions[to];

        const line =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "line"
            );

        line.setAttribute("x1",p1.x);
        line.setAttribute("y1",p1.y);

        line.setAttribute("x2",p2.x);
        line.setAttribute("y2",p2.y);

        line.setAttribute("class","edge");

        line.setAttribute(
            "id",
            `edge_${norm}`
        );

        svg.appendChild(line);
    }

    for(const node in nodePositions){

        if(node==="HOME") continue;

        const pos =
            nodePositions[node];

        const circle =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "circle"
            );

        circle.setAttribute("cx",pos.x);
        circle.setAttribute("cy",pos.y);

        circle.setAttribute("r",18);

        circle.setAttribute(
            "class",
            "node"
        );

        circle.setAttribute(
            "id",
            `node_${node}`
        );

        svg.appendChild(circle);

        const text =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "text"
            );

        text.setAttribute("x",pos.x);
        text.setAttribute("y",pos.y);

        text.setAttribute(
            "class",
            "label"
        );

        text.textContent=node;

        svg.appendChild(text);
    }

    drawHome(svg);

    updateMap();
}

function drawHome(svg){

    const pos =
        nodePositions.HOME;

    const house =
        document.createElementNS(
            "http://www.w3.org/2000/svg",
            "polygon"
        );

    house.setAttribute(
        "points",
        `
        ${pos.x},${pos.y-18}
        ${pos.x+14},${pos.y}
        ${pos.x+10},${pos.y}
        ${pos.x+10},${pos.y+16}
        ${pos.x-10},${pos.y+16}
        ${pos.x-10},${pos.y}
        ${pos.x-14},${pos.y}
        `
    );

    house.setAttribute(
        "class",
        "home"
    );

    svg.appendChild(house);
}

function updateMap(){

    document
        .querySelectorAll(".node")
        .forEach(n=>n.classList.remove("current"));

    document
        .querySelectorAll(".edge")
        .forEach(e=>e.classList.remove("current"));

    const node =
        parseNode(currentState);

    const current =
        document.getElementById(
            `node_${node}`
        );

    if(current){

        current.classList.add("current");
    }

    for(const edgeName in edgeVisitCounts){

        const edge =
            document.getElementById(
                `edge_${edgeName}`
            );

        if(!edge) continue;

        edge.classList.add("visited");

        if(edgeName===currentEdge){

            edge.classList.add("current");
        }
    }
}

function updateDisplay(){

    document.getElementById("state")
        .textContent=currentState;

    document.getElementById("distance")
        .textContent=totalDistance;

    document.getElementById("elevation")
        .textContent=
            totalElevation.toFixed(1);

    document.getElementById("steps")
        .textContent=stepCount;
}

function log(text){

    const div =
        document.getElementById("log");

    div.textContent += text + "\n";

    div.scrollTop =
        div.scrollHeight;
}

function step(){

    const options =
        transitions[currentState];

    if(!options){

        log(`ERROR:
${currentState}
に遷移がありません`);

        return;
    }

    const choice =
        options[
            Math.floor(
                Math.random()*options.length
            )
        ];

    const fromNode =
        parseNode(currentState);

    const toNode =
        parseNode(choice.next);

    if(!nodePositions[fromNode]){

        currentState=choice.next;

        updateDisplay();

        return;
    }

    const edge =
        edges[
            edgeKey(fromNode,toNode)
        ];

    if(!edge){

        log(`ERROR:
${fromNode} -> ${toNode}
の辺がありません`);

        return;
    }

    totalDistance += edge.distance;
    totalElevation += edge.elevation;

    stepCount++;

    const normalized =
        normalizedEdgeKey(
            fromNode,
            toNode
        );

    currentEdge=normalized;

    edgeVisitCounts[normalized] =
        (edgeVisitCounts[normalized]||0)+1;

    log(
`[${stepCount}]
${fromNode} → ${toNode}

${currentState}
→ ${choice.action}
→ ${choice.next}

距離: ${edge.distance}m
標高変化: ${edge.elevation}m

累積距離: ${totalDistance}m
累積標高: ${totalElevation.toFixed(1)}m`
    );

    currentState=choice.next;

    updateDisplay();

    updateMap();

    // HOME通過判定
    if(
        (fromNode==="A3" && toNode==="A4") ||
        (fromNode==="A4" && toNode==="A3")
    ){

        log(`
🏠 帰宅可能地点を通過
`);
    }
}

function autoWalk(n){

    for(let i=0;i<n;i++){

        step();
    }
}

document
    .getElementById("stepButton")
    .addEventListener("click",step);

document
    .getElementById("autoButton")
    .addEventListener("click",()=>{

        autoWalk(20);
    });

initialize();

</script>

</body>
</html>
