<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Walk</title>

<style>

body {
    font-family: sans-serif;
    padding: 20px;
    line-height: 1.6;
}

button {
    font-size: 16px;
    padding: 10px 20px;
    margin-right: 10px;
    margin-top: 10px;
}

#topArea {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

#leftPanel {
    min-width: 300px;
}

#status {
    margin-bottom: 20px;
}

#choices {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #ccc;
}

#log {
    margin-top: 20px;
    border: 1px solid #ccc;
    padding: 10px;
    max-height: 500px;
    overflow-y: auto;
    white-space: pre-wrap;
    background: #f8f8f8;
}

#mapContainer {
    border: 1px solid #ccc;
    padding: 10px;
}

svg {
    background: #fafafa;
}

.node {
    fill: white;
    stroke: black;
    stroke-width: 2;
}

.node.current {
    fill: red;
}

.edge {
    stroke: #cccccc;
    stroke-width: 6;
    stroke-linecap: round;

    transition:
        stroke 0.2s,
        stroke-width 0.2s;
}

.edge.visited {
    stroke: #0066cc;
}

.edge.current {
    stroke: red;
}

.label {
    font-size: 14px;
    text-anchor: middle;
    dominant-baseline: middle;
}

.directionArrow {
    fill: orange;
    stroke: black;
    stroke-width: 1;
}

/* HOME */

.homeBody {
    fill: white;
    stroke: black;
    stroke-width: 2;
}

.homeRoof {
    fill: orange;
    stroke: black;
    stroke-width: 2;
}

.homeCurrent {
    fill: red;
}

</style>
</head>

<body>

<h1>ランダム散歩エンジン</h1>

<div id="topArea">

    <div id="leftPanel">

        <div id="status">
            <p><strong>現在状態:</strong> <span id="state"></span></p>
            <p><strong>累積距離:</strong> <span id="distance">0</span> m</p>
            <p><strong>累積標高:</strong> <span id="elevation">0</span> m</p>
            <p><strong>歩数:</strong> <span id="steps">0</span></p>
        </div>

        <div id="choices">
            <strong>次の候補:</strong>
            <div id="choiceList"></div>
        </div>

        <button id="stepButton">1歩進む</button>
        <button id="autoButton">20歩自動</button>

    </div>

    <div id="mapContainer">

        <svg id="map" width="900" height="350"></svg>

    </div>

</div>

<div id="log"></div>

<script>

// ========================================
// データ
// ========================================

let transitions = {};
let edges = {};

let currentState = "HOME_START";

let totalDistance = 0;
let totalElevation = 0;

let walkLog = [];
let stepCount = 0;

let edgeVisitCounts = {};

let currentEdge = null;

// ========================================
// ノード座標
// ========================================

const nodePositions = {

    A0: {x: 80,  y: 80},
    A1: {x: 170, y: 80},
    A2: {x: 260, y: 80},
    A3: {x: 350, y: 80},

    HOME: {x: 395, y: 80},

    A4: {x: 440, y: 80},
    A5: {x: 530, y: 80},
    A6: {x: 620, y: 80},
    A7: {x: 760, y: 80},

    B0: {x: 80,  y: 250},
    B1: {x: 170, y: 250},
    B2: {x: 260, y: 250},
    B3: {x: 350, y: 250},
    B4: {x: 440, y: 250},
    B5: {x: 530, y: 250},
    B6: {x: 620, y: 250},
    B7: {x: 760, y: 250}
};

// ========================================
// CSV読み込み
// ========================================

async function loadCSV(path) {

    const response = await fetch(path);

    const text = await response.text();

    return text
        .trim()
        .split("\n")
        .map(line => line.split(","));
}

function edgeKey(a, b) {

    return `${a}_${b}`;
}

function normalizedEdgeKey(a, b) {

    return [a, b].sort().join("_");
}

// ========================================
// 初期化
// ========================================

async function initialize() {

    // 状態遷移
    const stateRows =
        await loadCSV("states.csv");

    for (let i = 1; i < stateRows.length; i++) {

        const [state, action, next] =
            stateRows[i].map(x => x.trim());

        if (!transitions[state]) {

            transitions[state] = [];
        }

        transitions[state].push({
            action,
            next
        });
    }

    // 辺データ
    const edgeRows =
        await loadCSV("edges.csv");

    for (let i = 1; i < edgeRows.length; i++) {

        const [from, to, distance, elevation] =
            edgeRows[i].map(x => x.trim());

        edges[edgeKey(from, to)] = {

            distance: Number(distance),
            elevation: Number(elevation)
        };

        edges[edgeKey(to, from)] = {

            distance: Number(distance),
            elevation: -Number(elevation)
        };
    }

    drawMap();

    updateDisplay();
}

// ========================================
// 地図描画
// ========================================

function drawMap() {

    const svg =
        document.getElementById("map");

    svg.innerHTML = "";

    // ====================================
    // 辺
    // ====================================

    const drawnEdges = new Set();

    for (const key in edges) {

        const [from, to] = key.split("_");

        const normalized =
            normalizedEdgeKey(from, to);

        if (drawnEdges.has(normalized)) {

            continue;
        }

        drawnEdges.add(normalized);

        const p1 = nodePositions[from];
        const p2 = nodePositions[to];

        const line =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "line"
            );

        line.setAttribute("x1", p1.x);
        line.setAttribute("y1", p1.y);

        line.setAttribute("x2", p2.x);
        line.setAttribute("y2", p2.y);

        line.setAttribute("class", "edge");

        line.setAttribute(
            "id",
            `edge_${normalized}`
        );

        svg.appendChild(line);
    }

    // ====================================
    // 通常ノード
    // ====================================

    for (const node in nodePositions) {

        if (node === "HOME") continue;

        const pos = nodePositions[node];

        const circle =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "circle"
            );

        circle.setAttribute("cx", pos.x);
        circle.setAttribute("cy", pos.y);

        circle.setAttribute("r", 18);

        circle.setAttribute(
            "class",
            "node"
        );

        circle.setAttribute(
            "id",
            `node_${node}`
        );

        svg.appendChild(circle);

        // ラベル
        const text =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "text"
            );

        text.setAttribute("x", pos.x);
        text.setAttribute("y", pos.y);

        text.setAttribute(
            "class",
            "label"
        );

        text.textContent = node;

        svg.appendChild(text);
    }

    // HOME描画
    drawHome(svg);

    // 方向矢印
    const arrow =
        document.createElementNS(
            "http://www.w3.org/2000/svg",
            "polygon"
        );

    arrow.setAttribute(
        "id",
        "directionArrow"
    );

    arrow.setAttribute(
        "class",
        "directionArrow"
    );

    svg.appendChild(arrow);

    updateMap();
}

// ========================================
// HOME描画
// ========================================

function drawHome(svg) {

    const pos = nodePositions["HOME"];

    // 屋根
    const roof =
        document.createElementNS(
            "http://www.w3.org/2000/svg",
            "polygon"
        );

    roof.setAttribute(
        "points",
        `
        ${pos.x},${pos.y - 18}
        ${pos.x + 14},${pos.y - 5}
        ${pos.x - 14},${pos.y - 5}
        `
    );

    roof.setAttribute(
        "class",
        "homeRoof"
    );

    roof.setAttribute(
        "id",
        "homeRoof"
    );

    svg.appendChild(roof);

    // 本体
    const body =
        document.createElementNS(
            "http://www.w3.org/2000/svg",
            "rect"
        );

    body.setAttribute("x", pos.x - 10);
    body.setAttribute("y", pos.y - 5);

    body.setAttribute("width", 20);
    body.setAttribute("height", 18);

    body.setAttribute(
        "class",
        "homeBody"
    );

    body.setAttribute(
        "id",
        "homeBody"
    );

    svg.appendChild(body);
}

// ========================================
// 地図更新
// ========================================

function updateMap() {

    // ノードリセット
    document
        .querySelectorAll(".node")
        .forEach(node => {

            node.classList.remove("current");
        });

    // 辺リセット
    document
        .querySelectorAll(".edge")
        .forEach(edge => {

            edge.classList.remove("current");
        });

    // HOMEリセット
    document
        .getElementById("homeBody")
        ?.classList.remove("homeCurrent");

    // 現在ノード
    const currentNode =
        parseNode(currentState);

    // HOME
    if (currentNode === "HOME") {

        document
            .getElementById("homeBody")
            ?.classList.add("homeCurrent");
    }

    // 通常ノード
    else {

        const currentElement =
            document.getElementById(
                `node_${currentNode}`
            );

        if (currentElement) {

            currentElement.classList.add("current");
        }
    }

    // 辺着色
    for (const edgeName in edgeVisitCounts) {

        const count =
            edgeVisitCounts[edgeName];

        const edgeElement =
            document.getElementById(
                `edge_${edgeName}`
            );

        if (!edgeElement) continue;

        edgeElement.classList.add("visited");

        edgeElement.setAttribute(
            "stroke-width",
            6 + count * 2
        );

        // 現在辺
        if (edgeName === currentEdge) {

            edgeElement.classList.add("current");
        }
    }

    updateDirectionArrow();
}

// ========================================
// 方向矢印
// ========================================

function updateDirectionArrow() {

    const arrow =
        document.getElementById(
            "directionArrow"
        );

    const [node, direction] =
        currentState.split("_");

    const pos =
        nodePositions[node];

    if (!direction || !pos) {

        arrow.setAttribute(
            "points",
            ""
        );

        return;
    }

    let points = "";

    // 東
    if (direction === "E") {

        points =
            `${pos.x + 28},${pos.y}
             ${pos.x + 12},${pos.y - 8}
             ${pos.x + 12},${pos.y + 8}`;
    }

    // 西
    if (direction === "W") {

        points =
            `${pos.x - 28},${pos.y}
             ${pos.x - 12},${pos.y - 8}
             ${pos.x - 12},${pos.y + 8}`;
    }

    // 北
    if (direction === "N") {

        points =
            `${pos.x},${pos.y - 28}
             ${pos.x - 8},${pos.y - 12}
             ${pos.x + 8},${pos.y - 12}`;
    }

    // 南
    if (direction === "S") {

        points =
            `${pos.x},${pos.y + 28}
             ${pos.x - 8},${pos.y + 12}
             ${pos.x + 8},${pos.y + 12}`;
    }

    arrow.setAttribute(
        "points",
        points
    );
}

// ========================================
// 補助
// ========================================

function parseNode(state) {

    return state.split("_")[0];
}

// ========================================
// 選択肢表示
// ========================================

function updateChoices() {

    const choiceDiv =
        document.getElementById(
            "choiceList"
        );

    choiceDiv.innerHTML = "";

    const options =
        transitions[currentState];

    if (!options) {

        choiceDiv.textContent =
            "選択肢なし";

        return;
    }

    for (const option of options) {

        const p =
            document.createElement("p");

        p.textContent =
            `${option.action} → ${option.next}`;

        choiceDiv.appendChild(p);
    }
}

// ========================================
// 1歩
// ========================================

function step() {

    // 帰宅済み
    if (currentState === "HOME_END") {

        log(`
🏠 帰宅済みです
`);

        return;
    }

    const options =
        transitions[currentState];

    if (!options || options.length === 0) {

        log(
`ERROR:
${currentState}
に遷移がありません`
        );

        return;
    }

    // ランダム選択
    const choice =
        options[
            Math.floor(
                Math.random() * options.length
            )
        ];

    const fromNode =
        parseNode(currentState);

    const toNode =
        parseNode(choice.next);

    // HOME_STARTなど
    if (!nodePositions[fromNode]) {

        currentState = choice.next;

        updateDisplay();

        updateMap();

        return;
    }

    const edge =
        edges[
            edgeKey(fromNode, toNode)
        ];

    if (!edge) {

        log(
`ERROR:
辺 ${fromNode} -> ${toNode}
が見つかりません`
        );

        return;
    }

    // 累積
    totalDistance += edge.distance;
    totalElevation += edge.elevation;

    stepCount++;

    // 現在辺
    const normalized =
        normalizedEdgeKey(
            fromNode,
            toNode
        );

    currentEdge = normalized;

    // 通過回数
    edgeVisitCounts[normalized] =
        (edgeVisitCounts[normalized] || 0)
        + 1;

    // ログ
    log(
`[${stepCount}]
${fromNode} → ${toNode}

${currentState}
→ ${choice.action}
→ ${choice.next}

距離: ${edge.distance}m
標高変化: ${edge.elevation}m

累積距離: ${totalDistance}m
累積標高: ${totalElevation.toFixed(1)}m
`
    );

    // 状態更新
    currentState = choice.next;

    updateDisplay();

    updateMap();

    // HOME到達で強制帰宅
    if (
        currentState === "HOME_E" ||
        currentState === "HOME_W"
    ) {

        log(`
🏠 帰宅しました

累積距離: ${totalDistance}m
累積標高: ${totalElevation.toFixed(1)}m
歩数: ${stepCount}
`);

        currentState = "HOME_END";

        updateDisplay();

        updateMap();
    }
}

// ========================================
// 自動歩行
// ========================================

function autoWalk(steps) {

    for (let i = 0; i < steps; i++) {

        if (currentState === "HOME_END") {

            break;
        }

        step();
    }
}

// ========================================
// 表示更新
// ========================================

function updateDisplay() {

    document
        .getElementById("state")
        .textContent = currentState;

    document
        .getElementById("distance")
        .textContent = totalDistance;

    document
        .getElementById("elevation")
        .textContent =
            totalElevation.toFixed(1);

    document
        .getElementById("steps")
        .textContent = stepCount;

    updateChoices();
}

// ========================================
// ログ
// ========================================

function log(text) {

    const logDiv =
        document.getElementById("log");

    logDiv.textContent += text + "\n";

    logDiv.scrollTop =
        logDiv.scrollHeight;
}

// ========================================
// ボタン
// ========================================

document
    .getElementById("stepButton")
    .addEventListener("click", step);

document
    .getElementById("autoButton")
    .addEventListener("click", () => {

        autoWalk(20);
    });

// ========================================
// 開始
// ========================================

initialize();

</script>

</body>
</html>
